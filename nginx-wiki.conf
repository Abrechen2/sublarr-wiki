# nginx-Konfiguration für wiki.sublarr.de (Wiki.js Reverse Proxy)
# Deployment: CT 124 oder equivalent
# Einspielen nach: /etc/nginx/sites-available/wiki.sublarr.de

server {
    listen 80;
    server_name wiki.sublarr.de;

    # Cloudflare Tunnel terminiert TLS — nginx spricht intern HTTP

    # M4: .git-Verzeichnis blockieren (500 → 404)
    location ~ /\.git {
        deny all;
        return 404;
    }

    # Alle versteckten Verzeichnisse blockieren
    location ~ /\. {
        deny all;
        return 404;
    }

    # L1: /healthz auf interne Netze beschränken
    location = /healthz {
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow 127.0.0.1;
        deny all;
        proxy_pass http://127.0.0.1:3000;
    }

    # Wiki.js Proxy
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # M2: BREACH — Vary: Cookie setzen, Kompression für Auth-Pages reduzieren
        add_header Vary "Cookie" always;
    }

    # L2: OCSP Stapling (nur relevant wenn TLS direkt auf nginx terminiert)
    # ssl_stapling on;
    # ssl_stapling_verify on;
    # resolver 1.1.1.1 8.8.8.8 valid=300s;
    # resolver_timeout 5s;

    server_tokens off;
}
